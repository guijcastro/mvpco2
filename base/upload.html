<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Audio Analyst - Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="font-bold text-xl text-gray-800 flex items-center gap-2">
            <i data-lucide="waves" class="text-blue-600"></i> AI Analyst
        </div>
                <div class="space-x-4 flex items-center">
            <a href="dashboard.html" class="text-blue-600 font-semibold">Meus Áudios</a>
            <a href="relatorio.html" class="text-green-600 hover:text-green-800 font-semibold">Análise de Custos</a>
            <a href="relatorio_dinamico.html" class="text-purple-600 hover:text-purple-800 font-semibold">Relatórios</a>
            <a href="settings.html" class="text-gray-600 hover:text-blue-600">Configurações</a>
            <button onclick="logout()" class="text-red-500 hover:text-red-700">Sair</button>
        </div>
</nav>

    <div class="max-w-2xl mx-auto mt-12 p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Enviar Novo éudio</h1>

        <!-- Toggle between Upload and Manual Input -->
        <div class="flex gap-2 mb-6">
            <button id="toggle-upload" onclick="toggleMode('upload')"
                class="flex-1 py-2 px-4 rounded-lg font-medium bg-blue-600 text-white">
                <i data-lucide="upload" class="w-4 h-4 inline mr-2"></i>Enviar éudio
            </button>
            <button id="toggle-manual" onclick="toggleMode('manual')"
                class="flex-1 py-2 px-4 rounded-lg font-medium bg-gray-200 text-gray-700 hover:bg-gray-300">
                <i data-lucide="file-text" class="w-4 h-4 inline mr-2"></i>Colar Transcriçé£o
            </button>
        </div>

        <!-- Upload Mode -->
        <div id="upload-mode" class="bg-white p-8 rounded-xl shadow-sm border border-gray-200 text-center">

            <div class="mb-6 text-left">
                <label class="block text-sm font-medium text-gray-700 mb-2">Loja / Onde ocorreu o atendimento?</label>
                <select id="upload-store"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-blue-500 outline-none bg-white">
                    <option value="Loja Central">Loja Central</option>
                    <option value="Loja Norte">Loja Norte</option>
                    <option value="Loja Sul">Loja Sul</option>
                    <option value="E-commerce">Canal Digital (E-commerce / WhatsApp)</option>
                </select>
            </div>

            <div id="drop-zone"
                class="border-2 border-dashed border-gray-300 rounded-lg p-10 cursor-pointer hover:bg-gray-50 transition">
                <i data-lucide="upload-cloud" class="w-12 h-12 text-gray-400 mx-auto mb-4"></i>
                <p class="text-gray-600 font-medium">Clique para selecionar ou arraste o arquivo aqui</p>
                <p class="text-xs text-gray-400 mt-2">MP3, WAV, M4A (Max 25MB)</p>
                <input type="file" id="file-input" class="hidden" accept="audio/*">
            </div>

            <div id="file-info"
                class="hidden mt-6 text-left bg-blue-50 p-4 rounded-lg border border-blue-100 flex justify-between items-center">
                <span class="font-medium text-blue-800 truncate" id="file-name">arquivo.mp3</span>
                <button onclick="clearFile()" class="text-blue-500 hover:text-red-500"><i data-lucide="x"
                        class="w-4 h-4"></i></button>
            </div>

            <button id="upload-btn" onclick="uploadFile()" disabled
                class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
                Iniciar Upload
            </button>

            <div id="progress-container" class="hidden mt-4">
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
                <p class="text-xs text-gray-500 mt-1 text-right" id="progress-text">0%</p>
            </div>
        </div>

        <!-- Manual Transcription Mode -->
        <div id="manual-mode" class="hidden bg-white p-8 rounded-xl shadow-sm border border-gray-200">
            <label class="block text-sm font-medium text-gray-700 mb-2">Té­tulo do éudio</label>
            <input type="text" id="manual-title" placeholder="Ex: Reunié£o com cliente - 09/02/2026"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 mb-4 focus:border-blue-500 outline-none">

            <label class="block text-sm font-medium text-gray-700 mb-2">Loja / Onde ocorreu o atendimento?</label>
            <select id="manual-store"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 mb-4 focus:border-blue-500 outline-none bg-white">
                <option value="Loja Central">Loja Central</option>
                <option value="Loja Norte">Loja Norte</option>
                <option value="Loja Sul">Loja Sul</option>
                <option value="E-commerce">Canal Digital (E-commerce / WhatsApp)</option>
            </select>

            <label class="block text-sm font-medium text-gray-700 mb-2">Transcriçé£o</label>
            <textarea id="manual-transcript" rows="12" placeholder="Cole ou digite a transcriçé£o aqui..."
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-blue-500 outline-none resize-none"></textarea>

            <button id="save-manual-btn" onclick="saveManualTranscript()"
                class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition">
                Salvar Transcriçé£o
            </button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const supabaseUrl = window.SUPABASE_URL || localStorage.getItem('SUPABASE_URL');
        const supabaseKey = window.SUPABASE_KEY || localStorage.getItem('SUPABASE_KEY');
        if (!supabaseUrl) window.location.href = 'login.html';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileInfo = document.getElementById('file-info');
        const fileName = document.getElementById('file-name');
        const uploadBtn = document.getElementById('upload-btn');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');

        let selectedFile = null;

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        }

        // Toggle between upload and manual modes
        function toggleMode(mode) {
            const uploadMode = document.getElementById('upload-mode');
            const manualMode = document.getElementById('manual-mode');
            const toggleUpload = document.getElementById('toggle-upload');
            const toggleManual = document.getElementById('toggle-manual');

            if (mode === 'upload') {
                uploadMode.classList.remove('hidden');
                manualMode.classList.add('hidden');
                toggleUpload.className = 'flex-1 py-2 px-4 rounded-lg font-medium bg-blue-600 text-white';
                toggleManual.className = 'flex-1 py-2 px-4 rounded-lg font-medium bg-gray-200 text-gray-700 hover:bg-gray-300';
            } else {
                uploadMode.classList.add('hidden');
                manualMode.classList.remove('hidden');
                toggleUpload.className = 'flex-1 py-2 px-4 rounded-lg font-medium bg-gray-200 text-gray-700 hover:bg-gray-300';
                toggleManual.className = 'flex-1 py-2 px-4 rounded-lg font-medium bg-blue-600 text-white';
            }
            lucide.createIcons();
        }

        let isSubmitting = false;

        // Save manual transcription
        async function saveManualTranscript() {
            if (isSubmitting) return; // Prevent double clicks

            const title = document.getElementById('manual-title').value.trim();
            const transcript = document.getElementById('manual-transcript').value.trim();
            const storeId = document.getElementById('manual-store').value;

            if (!title || !transcript) {
                alert('Por favor, preencha o té­tulo e a transcriçé£o.');
                return;
            }

            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            isSubmitting = true;
            const saveBtn = document.getElementById('save-manual-btn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin inline"></i> Salvando...';
            lucide.createIcons();

            try {
                // 1. Create audio file entry (without actual file)
                const { data: audioFile, error: audioError } = await supabaseClient
                    .from('audio_files')
                    .insert({
                        user_id: user.id,
                        file_name: title,
                        storage_path: `manual/${user.id}/${Date.now()}`, // Dummy path
                        status: 'processed', // Mark as processed since we have the transcript
                        store_id: storeId
                    })
                    .select()
                    .single();

                if (audioError) throw audioError;

                // 2. Save transcription
                const { error: transcriptError } = await supabaseClient
                    .from('transcriptions')
                    .insert({
                        audio_id: audioFile.id,
                        user_id: user.id,
                        text: transcript
                    });

                if (transcriptError) throw transcriptError;

                alert('Transcriçé£o salva com sucesso!');
                window.location.href = 'dashboard.html';

            } catch (error) {
                console.error('Error:', error);
                alert('Erro ao salvar: ' + error.message);
                saveBtn.disabled = false;
                saveBtn.textContent = 'Salvar Transcriçé£o';
            }
        }

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        // Drag & Drop
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('bg-gray-50'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('bg-gray-50'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-gray-50');
            handleFile(e.dataTransfer.files[0]);
        });

        function handleFile(file) {
            if (!file || !file.type.startsWith('audio/')) {
                alert('Por favor, selecione um arquivo de é¡udio vé¡lido.');
                return;
            }
            selectedFile = file;
            fileName.textContent = file.name;
            fileInfo.classList.remove('hidden');
            dropZone.classList.add('hidden');
            uploadBtn.disabled = false;
        }

        function clearFile() {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.add('hidden');
            dropZone.classList.remove('hidden');
            uploadBtn.disabled = true;
        }

        async function uploadFile() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) window.location.href = 'login.html';

            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Enviando...';
            progressContainer.classList.remove('hidden');

            const filePath = `${user.id}/${Date.now()}_${selectedFile.name}`;
            const storeId = document.getElementById('upload-store').value;

            // 1. Upload to Storage
            const { data, error } = await supabaseClient.storage
                .from('audios')
                .upload(filePath, selectedFile, {
                    cacheControl: '3600',
                    upsert: false
                });

            if (error) {
                alert('Falha no envio: ' + error.message);
                resetUpload();
                return;
            }

            // 2. Save Metadata to DB
            const { error: dbError } = await supabaseClient
                .from('audio_files')
                .insert({
                    user_id: user.id,
                    file_name: selectedFile.name,
                    storage_path: filePath,
                    status: 'uploaded',
                    store_id: storeId
                });

            if (dbError) {
                alert('Erro ao salvar metadados: ' + dbError.message);
                resetUpload();
                return;
            }

            // Success
            progressBar.style.width = '100%';
            progressText.textContent = '100%';
            setTimeout(() => window.location.href = 'dashboard.html', 500);
        }

        function resetUpload() {
            uploadBtn.disabled = false;
            uploadBtn.textContent = 'Iniciar Upload';
            progressContainer.classList.add('hidden');
            progressBar.style.width = '0%';
        }

        lucide.createIcons();
    </script>
</body>

</html>
