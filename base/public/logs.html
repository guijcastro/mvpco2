<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Chats - AI Audio Analyst</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase SDK JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .chat-bubble-ai {
            background-color: #f7f7f8;
            border: 1px solid #ececf1;
            border-radius: 1rem;
            padding: 1rem;
            color: #374151;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            max-width: 90%;
        }

        .chat-bubble-user {
            background-color: #2563eb;
            color: white;
            border-radius: 1rem;
            padding: 1rem;
            align-self: flex-end;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
            max-width: 85%;
        }
    </style>
</head>

<body class="bg-gray-50 flex flex-col h-screen overflow-hidden">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-100 z-10 flex-shrink-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i data-lucide="history" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-800">Histórico de Chats</h1>
            </div>

            <div class="space-x-4 flex items-center">
                <a href="dashboard.html" class="text-blue-600 font-semibold">Meus Áudios</a>
                <a href="relatorio.html" class="text-green-600 hover:text-green-800 font-semibold">Custos</a>
                <a href="relatorio_dinamico.html"
                    class="text-purple-600 hover:text-purple-800 font-semibold">Relatórios</a>
                <a href="logs.html" class="text-indigo-600 font-semibold hover:text-indigo-800">Logs de Chat</a>
                <a href="settings.html" class="text-gray-600 hover:text-blue-600">Configurações</a>
                <button onclick="logout()" class="text-red-500 hover:text-red-700">Sair</button>
            </div>
        </div>
    </nav>

    <!-- Main Container Layout: 2 Columns -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 flex gap-6 min-h-0 overflow-hidden">

        <!-- Left Column: Sessions List -->
        <div class="w-1/3 bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col overflow-hidden">
            <div class="p-4 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
                <h2 class="font-bold text-gray-700">Conversas Anteriores</h2>
                <span id="sessions-count"
                    class="text-xs bg-gray-200 text-gray-600 px-2 py-1 rounded-full font-medium">0</span>
            </div>

            <div id="sessions-container" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
                <div class="text-center py-10 text-gray-400">
                    <i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2 text-blue-500"></i>
                    <p class="text-sm">Carregando histórico...</p>
                </div>
            </div>
        </div>

        <!-- Right Column: Chat Viewer -->
        <div class="flex-1 bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col overflow-hidden">

            <!-- Chat Header -->
            <div class="p-4 border-b border-gray-100 bg-blue-50/50 flex justify-between items-center h-16">
                <div class="flex flex-col">
                    <h2 id="active-chat-title" class="font-bold text-gray-800 text-lg leading-tight">Selecione uma
                        conversa</h2>
                    <span id="active-chat-date" class="text-xs text-gray-500 font-medium"></span>
                </div>

                <div id="active-chat-actions" class="hidden flex gap-2">
                    <!-- O botão de excluir log foi desativado a pedido do projeto -->
                </div>
            </div>

            <!-- Chat Messages Container -->
            <div id="chat-messages" class="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-6 bg-gray-50/30">
                <div class="h-full flex flex-col items-center justify-center text-gray-400 opacity-60">
                    <i data-lucide="messages-square" class="w-16 h-16 mb-4 text-gray-300"></i>
                    <p class="text-center">As mensagens da sessão selecionada<br>aparecerão aqui.</p>
                </div>
            </div>

        </div>
    </main>

    <script src="js/config.js"></script>
    <script>
        lucide.createIcons();

        // Inicialize o cliente do Supabase
        const supabaseUrl = window.SUPABASE_URL || localStorage.getItem('SUPABASE_URL');
        const supabaseKey = window.SUPABASE_KEY || localStorage.getItem('SUPABASE_KEY');
        if (!supabaseUrl) window.location.href = 'login.html';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let activeSessionId = null;

        // Auto Load Sessions
        window.addEventListener('DOMContentLoaded', async () => {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = session.user;
            await loadSessions();
        });

        // 1. Fetch Sessions List
        async function loadSessions() {
            const container = document.getElementById('sessions-container');
            const counter = document.getElementById('sessions-count');

            const { data: sessions, error } = await supabaseClient
                .from('chat_sessions')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Erro ao carregar sessões", error);
                container.innerHTML = `<div class="p-4 text-red-500 text-sm">Erro ao carregar histórico: ${error.message}</div>`;
                return;
            }

            counter.textContent = sessions.length;

            if (sessions.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-10 px-4 text-gray-400">
                        <i data-lucide="inbox" class="w-8 h-8 opacity-50 mx-auto mb-3"></i>
                        <p class="text-sm">Você ainda não possui histórico de conversas salvo.</p>
                        <a href="dashboard.html" class="inline-block mt-4 text-blue-600 hover:underline text-sm font-medium">Ir para Meus Áudios</a>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            container.innerHTML = '';

            sessions.forEach(session => {
                const dateObj = new Date(session.created_at);
                const isToday = dateObj.toDateString() === new Date().toDateString();
                const dateStr = isToday ? dateObj.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : dateObj.toLocaleDateString('pt-BR');

                const btn = document.createElement('button');
                btn.className = `w-full text-left p-3 rounded-lg border border-transparent hover:border-blue-200 hover:bg-blue-50/50 transition flex flex-col gap-1 session-item group`;
                btn.dataset.id = session.id;
                btn.onclick = () => selectSession(session.id, session.title, dateObj);

                btn.innerHTML = `
                    <div class="flex justify-between items-start w-full">
                        <span class="font-medium text-gray-800 text-sm truncate pr-2">${session.title || 'Conversa sem título'}</span>
                        <span class="text-[11px] text-gray-400 whitespace-nowrap mt-0.5">${dateStr}</span>
                    </div>
                    <div class="text-xs text-gray-500 truncate opacity-0 group-hover:opacity-100 transition-opacity">
                        Clique para ler  <i data-lucide="arrow-right" class="inline-block w-3 h-3 ml-1"></i>
                    </div>
                `;
                container.appendChild(btn);
            });
            lucide.createIcons();
        }

        // 2. Load Specific Session Messages
        async function selectSession(sessionId, title, dateObj) {
            activeSessionId = sessionId;

            // Update UI State
            document.querySelectorAll('.session-item').forEach(el => {
                el.classList.remove('bg-blue-50', 'border-blue-200');
                if (el.dataset.id === sessionId) el.classList.add('bg-blue-50', 'border-blue-200');
            });

            document.getElementById('active-chat-title').textContent = title;
            document.getElementById('active-chat-date').textContent = dateObj.toLocaleString('pt-BR');
            document.getElementById('active-chat-actions').classList.remove('hidden');

            const viewer = document.getElementById('chat-messages');
            viewer.innerHTML = `<div class="text-center py-6"><i data-lucide="loader-2" class="w-6 h-6 animate-spin text-blue-500 mx-auto"></i></div>`;
            lucide.createIcons();

            // Fetch Messages (Ascending for Chronological Order)
            const { data: messages, error } = await supabaseClient
                .from('chat_messages')
                .select('*')
                .eq('session_id', sessionId)
                .order('created_at', { ascending: true });

            if (error) {
                viewer.innerHTML = `<div class="text-red-500 p-4">Erro ao carregar mensagens: ${error.message}</div>`;
                return;
            }

            viewer.innerHTML = '';

            messages.forEach(msg => {
                const msgEl = document.createElement('div');
                msgEl.className = 'flex flex-col gap-1 w-full';

                const timeStr = new Date(msg.created_at).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

                if (msg.role === 'user') {
                    // User Bubble
                    msgEl.innerHTML = `
                        <div class="flex flex-col items-end">
                            <span class="text-[10px] text-gray-400 mb-1 flex items-center gap-1">Você <i data-lucide="user" class="w-3 h-3"></i></span>
                            <div class="chat-bubble-user text-[15px] leading-relaxed whitespace-pre-wrap">${msg.content}</div>
                            <span class="text-[10px] text-gray-400 mt-1">${timeStr}</span>
                        </div>
                    `;
                } else if (msg.role === 'ai') {
                    // AI Bubble
                    const modelName = msg.model ? ` via ${msg.model}` : '';
                    msgEl.innerHTML = `
                        <div class="flex flex-col items-start w-full">
                            <span class="text-[10px] text-gray-400 mb-1 flex items-center gap-1"><i data-lucide="bot" class="w-3 h-3 text-blue-500"></i> Assistente AI ${modelName}</span>
                            <div class="chat-bubble-ai text-[15px] leading-relaxed whitespace-pre-wrap">${msg.content}</div>
                            <span class="text-[10px] text-gray-400 mt-1">${timeStr}</span>
                        </div>
                    `;
                } else if (msg.role === 'system') {
                    // System Info Bubble
                    msgEl.innerHTML = `
                        <div class="flex justify-center my-2">
                            <div class="bg-gray-100/80 border border-gray-200 text-gray-500 text-xs px-3 py-1.5 rounded-lg flex items-center gap-2 max-w-sm text-center">
                                <i data-lucide="info" class="w-3 h-3 flex-shrink-0"></i>
                                <span><b>Instrução Base:</b> ${msg.content.substring(0, 60)}${msg.content.length > 60 ? '...' : ''}</span>
                            </div>
                        </div>
                    `;
                }

                viewer.appendChild(msgEl);
            });

            // Scroll to bottom
            viewer.scrollTop = viewer.scrollHeight;
            lucide.createIcons();
        }

        // 3. Delete Session - DISABLED
        async function deleteCurrentSession() {
            // alert("Remoção de logs está desativada.");
            return;
        }

        // Authentication Handlers
        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        }

    </script>
</body>

</html>
