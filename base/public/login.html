<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analista de Ãudio IA - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">

    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                AI Audio Analyst
            </h1>
            <p class="text-gray-400 mt-2">Entre para acessar seu dashboard</p>
        </div>

        <form id="auth-form" class="space-y-4">
            <div>
                <label class="block text-gray-400 text-sm mb-1">Email</label>
                <input type="email" id="email" required
                    class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500 transition">
            </div>
            <div>
                <label class="block text-gray-400 text-sm mb-1">Senha</label>
                <input type="password" id="password" required
                    class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500 transition">
            </div>

            <div class="text-red-400 text-sm hidden" id="error-msg"></div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition duration-200">
                Entrar / Cadastrar
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            Desenvolvido por Netlify & Supabase
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        // Initialize Supabase with keys from config.js
        const supabaseUrl = window.SUPABASE_URL || localStorage.getItem('SUPABASE_URL');
        const supabaseKey = window.SUPABASE_KEY || localStorage.getItem('SUPABASE_KEY');

        if (supabaseUrl && supabaseKey) {
            localStorage.setItem('SUPABASE_URL', supabaseUrl);
            localStorage.setItem('SUPABASE_KEY', supabaseKey);
        }

        // Use supabaseClient to avoid conflict with library 'supabase' global
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        const form = document.getElementById('auth-form');
        const errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            errorMsg.classList.add('hidden');
            errorMsg.textContent = '';
            console.log("Tentando login para:", email);

            // Try Login
            let { data, error } = await supabaseClient.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                console.error("Erro de Login:", error);

                // If invalid credentials, suggest signup or try again
                if (error.message.includes("Invalid login credentials")) {
                    errorMsg.innerHTML = `Login falhou. <button type="button" onclick="signupUser()" class="underline font-bold">Clique aqui para Cadastrar</button> se nÃ£o tiver conta.`;
                } else {
                    errorMsg.textContent = "Erro: " + error.message;
                }
                errorMsg.classList.remove('hidden');
            } else {
                console.log("Login com Sucesso!", data);
                window.location.href = 'dashboard.html';
            }
        });

        async function signupUser() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Por favor, digite email e senha primeiro.");
                return;
            }

            console.log("Tentando cadastro...");
            const { data, error } = await supabaseClient.auth.signUp({
                email,
                password
            });

            const errorMsg = document.getElementById('error-msg');
            if (error) {
                console.error("Erro de Cadastro:", error);
                alert("Falha no Cadastro: " + error.message);
            } else {
                console.log("Cadastro com Sucesso:", data);
                alert("Conta criada com sucesso! VocÃª pode logar agora.");
                // Try auto-login after signup
                window.location.href = 'dashboard.html';
            }
        }

        // Check if already logged in
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            }
        }
        checkSession();
    </script>
</body>

</html>
