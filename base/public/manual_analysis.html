<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnÃ¡lise RÃ¡pida - AI Audio Analyst</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Add Markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='dashboard.html'">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i data-lucide="mic-2" class="w-5 h-5 text-white"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-900">AI Audio Analyst</h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="window.location.href='dashboard.html'"
                    class="text-sm font-medium text-gray-600 hover:text-gray-900">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 inline mr-1"></i> Dashboard
                </button>
                <div class="h-6 w-px bg-gray-200"></div>
                <button onclick="logout()" class="text-sm font-medium text-red-600 hover:text-red-700">
                    Sair
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main
        class="flex-1 max-w-7xl mx-auto w-full p-4 sm:p-6 lg:p-8 flex flex-col lg:flex-row gap-6 h-[calc(100vh-4rem)]">

        <!-- Left Column: Transcription Input -->
        <div class="flex-1 flex flex-col bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden h-full">
            <div class="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <h2 class="font-semibold text-gray-800 flex items-center gap-2">
                    <i data-lucide="file-text" class="w-4 h-4 text-blue-600"></i>
                    TranscriÃ§Ã£o / Contexto
                </h2>
                <button onclick="clearTranscription()"
                    class="text-xs text-gray-500 hover:text-red-600 flex items-center gap-1 transition-colors">
                    <i data-lucide="trash-2" class="w-3 h-3"></i> Limpar
                </button>
            </div>
            <textarea id="transcription-input"
                class="flex-1 p-4 resize-none focus:outline-none focus:ring-0 text-gray-700 text-sm leading-relaxed"
                placeholder="Cole aqui a transcriÃ§Ã£o ou texto que deseja analisar..."></textarea>
        </div>

        <!-- Right Column: Chat Interface -->
        <div class="flex-1 flex flex-col bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden h-full">
            <div class="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <h2 class="font-semibold text-gray-800 flex items-center gap-2">
                    <i data-lucide="message-square" class="w-4 h-4 text-purple-600"></i>
                    Analista IA (Cliente Oculto)
                </h2>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-xs text-gray-500">Online</span>
                </div>
            </div>

            <!-- Chat History -->
            <div id="chat-history" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50/50">
                <!-- Welcome Message -->
                <div class="flex justify-start">
                    <div
                        class="bg-white text-gray-800 border border-gray-200 p-3 rounded-lg rounded-tl-none shadow-sm text-sm max-w-[85%]">
                        OlÃ¡! Cole a transcriÃ§Ã£o ao lado e me pergunte qualquer coisa sobre ela. Sou especialista em
                        anÃ¡lises de Cliente Oculto.
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 border-t border-gray-100 bg-white">
                <form id="chat-form" class="flex gap-2">
                    <input type="text" id="user-input"
                        class="flex-1 bg-gray-50 border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition-all"
                        placeholder="FaÃ§a uma pergunta sobre a transcriÃ§Ã£o..." autocomplete="off">
                    <button type="submit"
                        class="bg-blue-600 hover:bg-blue-700 text-white p-2.5 rounded-lg transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </form>
            </div>
        </div>

    </main>

    <script src="js/config.js"></script>
    <script>
        const supabaseUrl = window.SUPABASE_URL || localStorage.getItem('SUPABASE_URL');
        const supabaseKey = window.SUPABASE_KEY || localStorage.getItem('SUPABASE_KEY');
        if (!supabaseUrl) window.location.href = 'login.html';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        const transcriptionInput = document.getElementById('transcription-input');
        const chatForm = document.getElementById('chat-form');
        const chatHistory = document.getElementById('chat-history');
        const userInput = document.getElementById('user-input');
        const submitBtn = chatForm.querySelector('button');

        function clearTranscription() {
            if (confirm('Tem certeza que deseja limpar a transcriÃ§Ã£o?')) {
                transcriptionInput.value = '';
                transcriptionInput.focus();
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;

            // Parse Markdown for AI responses
            const content = role === 'ai' ? marked.parse(text) : text.replace(/\n/g, '<br>');

            div.innerHTML = `
                <div class="${role === 'user' ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white text-gray-800 border border-gray-200 rounded-tl-none'} p-3 rounded-lg shadow-sm text-sm max-w-[85%] prose prose-sm ${role === 'user' ? 'prose-invert' : ''}">
                    ${content}
                </div>
            `;
            chatHistory.appendChild(div);
            // Scroll to bottom
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        // --- Encryption Helpers (Reused) ---
        async function getEncryptionKey(userId) {
            const encoder = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                'raw', encoder.encode(userId + 'AI-AUDIO-ANALYST-SECRET-2026'), { name: 'PBKDF2' }, false, ['deriveKey']
            );
            return await crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt: encoder.encode('ai-audio-analyst-salt'), iterations: 100000, hash: 'SHA-256' },
                keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
            );
        }

        async function decryptText(encryptedBase64, userId) {
            if (!encryptedBase64) return '';
            try {
                const key = await getEncryptionKey(userId);
                const combined = Uint8Array.from(atob(encryptedBase64), c => c.charCodeAt(0));
                const iv = combined.slice(0, 12);
                const encrypted = combined.slice(12);
                const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, encrypted);
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                console.error('Decryption failed:', e);
                return encryptedBase64;
            }
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            const transcription = transcriptionInput.value.trim();

            if (!message) return;
            if (!transcription) {
                alert('Por favor, cole uma transcriÃ§Ã£o primeiro.');
                transcriptionInput.focus();
                return;
            }

            // UI Updates
            appendMessage('user', message);
            userInput.value = '';
            userInput.disabled = true;
            submitBtn.disabled = true;

            // Loading Indicator
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'flex justify-start';
            loadingDiv.innerHTML = `
                <div class="bg-white text-gray-500 border border-gray-200 p-3 rounded-lg rounded-tl-none shadow-sm text-sm flex items-center gap-2">
                    <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Analisando...
                </div>
            `;
            chatHistory.appendChild(loadingDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            try {
                // Get User & Key
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) throw new Error('UsuÃ¡rio nÃ£o autenticado');

                const { data: settings } = await supabaseClient.from('user_settings').select('gemini_key').eq('user_id', user.id).single();

                if (!settings || !settings.gemini_key) {
                    throw new Error('Configure sua chave API nas configuraÃ§Ãµes.');
                }

                let apiKey = await decryptText(settings.gemini_key, user.id);

                // Call Backend
                const response = await fetch('/.netlify/functions/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        transcription: transcription,
                        query: message,
                        apiKey: apiKey
                    })
                });

                const result = await response.json();

                // Remove loading
                chatHistory.removeChild(loadingDiv);

                if (response.ok) {
                    appendMessage('ai', result.result);
                } else {
                    throw new Error(result.error || 'Erro desconhecido');
                }

            } catch (err) {
                if (chatHistory.contains(loadingDiv)) chatHistory.removeChild(loadingDiv);
                appendMessage('ai', `**Erro:** ${err.message}`);
                console.error(err);
            } finally {
                userInput.disabled = false;
                submitBtn.disabled = false;
                userInput.focus();
            }
        });

        lucide.createIcons();
    </script>
</body>

</html>
