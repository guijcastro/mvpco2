<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MVPCO — Login</title>
  <meta name="description" content="Sistema de Cliente Oculto para Varejo Ótico Premium. Acesse sua conta.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f2044 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1.25rem;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .logo p {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 0.25rem;
    }

    .tabs {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: 0.5rem;
      margin-bottom: 1.75rem;
      padding: 0.25rem;
    }

    .tab-btn {
      flex: 1;
      padding: 0.6rem;
      border: none;
      background: transparent;
      color: #94a3b8;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 0.35rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .tab-btn.active {
      background: #3b82f6;
      color: #fff;
    }

    .form-group { margin-bottom: 1.1rem; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 0.5rem;
      color: #fff;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #475569; }

    .btn-primary {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: none;
      border-radius: 0.5rem;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.85rem;
      margin-top: 1rem;
      display: none;
    }

    .alert.error   { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>MVPCO</h1>
      <p>Cliente Oculto — Varejo Ótico Premium</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')" id="tab-login">Entrar</button>
      <button class="tab-btn" onclick="switchTab('signup')" id="tab-signup">Cadastrar</button>
    </div>

    <form id="auth-form" onsubmit="handleAuth(event)">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••" required minlength="6" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="submit-btn">Entrar</button>
    </form>

    <div id="alert" class="alert"></div>
  </div>

  <script>
    const supabaseClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
    let currentTab = 'login';

    // Já logado? Redireciona direto
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'index.html';
    });

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      document.getElementById('submit-btn').textContent = tab === 'login' ? 'Entrar' : 'Criar conta';
      hideAlert();
    }

    async function handleAuth(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submit-btn');

      btn.disabled = true;
      btn.textContent = 'Aguarde...';
      hideAlert();

      try {
        let result;
        if (currentTab === 'login') {
          result = await supabaseClient.auth.signInWithPassword({ email, password });
        } else {
          result = await supabaseClient.auth.signUp({ email, password });
        }

        const { error, data } = result;
        if (error) throw error;

        if (currentTab === 'signup' && data.user && !data.session) {
          showAlert('Conta criada! Verifique seu e-mail para confirmar.', 'success');
        } else {
          window.location.href = 'index.html';
        }
      } catch (err) {
        showAlert(err.message || 'Erro ao autenticar. Tente novamente.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = currentTab === 'login' ? 'Entrar' : 'Criar conta';
      }
    }

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = `alert ${type}`;
      el.style.display = 'block';
    }
    function hideAlert() {
      document.getElementById('alert').style.display = 'none';
    }
  </script>
</body>
</html>
